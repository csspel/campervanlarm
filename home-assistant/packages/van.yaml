# =========================
# Campervanlarm – HA package (ellie)
# Topic base: van/ellie/
#
# Uplink:
#   - van/ellie/tele/alive
#   - van/ellie/tele/gps
#   - van/ellie/tele/pir
#
# Desired state:
#   - van/ellie/state/desired_profile   (retain=true, qos=1)
#
# Downlink commands:
#   - van/ellie/cmd/downlink            (retain=false)
#
# Ack:
#   - van/ellie/ack                     (device -> HA)
#
# Event ACK:
#   - van/ellie/cmd/ack                 (HA -> device)
# =========================

mqtt:
  sensor:
    # ---------- RAW / BASIC ----------
    - name: "Van Alive (raw)"
      unique_id: van_alive_raw
      state_topic: "van/ellie/tele/alive"
      value_template: "{{ value }}"
      force_update: true

    - name: "Van Profile (device)"
      unique_id: van_profile_device
      state_topic: "van/ellie/tele/alive"
      value_template: "{{ value_json.profile | default('unknown') }}"
      force_update: true

    - name: "Van Uptime (s)"
      unique_id: van_uptime_s
      state_topic: "van/ellie/tele/alive"
      unit_of_measurement: "s"
      state_class: measurement
      value_template: "{{ value_json.uptime_s | default(0) }}"
      force_update: true

    - name: "Van Msg ID"
      unique_id: van_msg_id
      state_topic: "van/ellie/tele/alive"
      value_template: "{{ value_json.msg_id | default('') }}"
      force_update: true

    # ---------- ACK ----------
    - name: "Van Ack (raw)"
      unique_id: van_ack_raw
      state_topic: "van/ellie/ack"
      value_template: "{{ value }}"
      force_update: true

    - name: "Van Ack Msg ID"
      unique_id: van_ack_msg_id
      state_topic: "van/ellie/ack"
      value_template: "{{ value_json.ack_msg_id | default(0) }}"
      force_update: true

    - name: "Van Ack Status"
      unique_id: van_ack_status
      state_topic: "van/ellie/ack"
      value_template: "{{ value_json.status | default('') }}"
      force_update: true

    - name: "Van Ack Detail"
      unique_id: van_ack_detail
      state_topic: "van/ellie/ack"
      value_template: "{{ value_json.detail | default('') }}"
      force_update: true

    # ---------- PIR ----------
    - name: "Van PIR (raw)"
      unique_id: van_pir_raw
      state_topic: "van/ellie/tele/pir"
      value_template: "{{ value }}"
      force_update: true

    - name: "Van PIR Event ID"
      unique_id: van_pir_event_id
      state_topic: "van/ellie/tele/pir"
      value_template: "{{ value_json.pir_event_id | default(0) }}"
      force_update: true

    - name: "Van PIR Count"
      unique_id: van_pir_count
      state_topic: "van/ellie/tele/pir"
      value_template: "{{ value_json.count | default(0) }}"
      force_update: true

    # ---------- GPS META ----------
    - name: "Van GPS fix_ok"
      unique_id: van_gps_fix_ok
      state_topic: "van/ellie/tele/gps"
      value_template: >
        {% set p = value_json %}
        {% if p.type == 'GPS' and p.mode == 'single' %}
          {{ p.fix_ok | default(false) }}
        {% else %}
          {{ states('sensor.van_gps_fix_ok') | default('false') }}
        {% endif %}
      force_update: true

    - name: "Van GPS epoch_utc"
      unique_id: van_gps_epoch_utc
      state_topic: "van/ellie/tele/gps"
      value_template: >
        {% set p = value_json %}
        {% if p.type == 'GPS' and p.mode == 'single' %}
          {{ p.epoch_utc | default(0) }}
        {% else %}
          {{ states('sensor.van_gps_epoch_utc') | int(0) }}
        {% endif %}
      force_update: true

    - name: "Van GPS FIX senaste epoch_utc"
      unique_id: van_gps_fix_last_epoch
      state_topic: "van/ellie/tele/gps"
      value_template: >
        {% set p = value_json %}
        {% if p.type != 'GPS' %}
          {{ states('sensor.van_gps_fix_senaste_epoch_utc') | int(0) }}
        {% elif p.mode == 'single' %}
          {% if (p.fix_ok | default(false)) and (p.lat is defined) and (p.lon is defined) and (p.lat is not none) and (p.lon is not none) %}
            {{ p.epoch_utc | default(0) }}
          {% else %}
            {{ states('sensor.van_gps_fix_senaste_epoch_utc') | int(0) }}
          {% endif %}
        {% else %}
          {{ states('sensor.van_gps_fix_senaste_epoch_utc') | int(0) }}
        {% endif %}
      force_update: true

  device_tracker:
    - name: "Van Ellie"
      unique_id: van_ellie_tracker_v2
      state_topic: "van/ellie/tele/gps"
      source_type: gps

      value_template: >
        {% set p = value_json %}
        {% if p.type == 'GPS'
              and p.mode == 'single'
              and p.lat is defined and p.lat is not none
              and p.lon is defined and p.lon is not none %}
          not_home
        {% else %}
          not_home
        {% endif %}

      json_attributes_topic: "van/ellie/tele/gps"
      json_attributes_template: >
        {% set p = value_json %}
        {% if p.type == 'GPS'
              and p.mode == 'single'
              and p.lat is defined and p.lat is not none
              and p.lon is defined and p.lon is not none %}
          {
            "latitude": {{ p.lat }},
            "longitude": {{ p.lon }},
            "speed_kmh": {{ p.speed_kmh | default(0) }},
            "alt_m": {{ p.alt_m | default(0) }},
            "hdop": {{ p.hdop | default(0) }},
            "sats": {{ p.sats | default(0) }},
            "epoch_utc": {{ p.epoch_utc | default(0) }},
            "profile": {{ p.profile | default('') | tojson }},
            "fix_ok": {{ p.fix_ok | default(false) | tojson }}
          }
        {% else %}
          {}
        {% endif %}

input_select:
  van_profile_desired:
    name: "Van läge (önskat)"
    options:
      - PARKED
      - TRAVEL
      - ARMED
      - TRIGGERED
      - ALARM
    icon: mdi:van-utility

input_number:
  van_profile_change_id:
    name: "Van profile change id"
    min: 1
    max: 9999999
    step: 1
    mode: box

  van_last_sent_profile_change_id:
    name: "Van senaste skickade profile change id"
    min: 0
    max: 9999999
    step: 1
    mode: box

input_text:
  van_last_profile_sent:
    name: "Van senaste profil skickad (HA-tid)"
    max: 32

template:
  - sensor:
      - name: "Van Alive senast (HA-tid)"
        unique_id: van_alive_last_ha_time
        device_class: timestamp
        state: "{{ states.sensor.van_alive_raw.last_updated }}"

      - name: "Minuter sedan Van Alive"
        unique_id: van_minutes_since_alive
        unit_of_measurement: "min"
        state_class: measurement
        state: >
          {% set ts = as_timestamp(states.sensor.van_alive_raw.last_updated, default=0) %}
          {{ ((now().timestamp() - ts) / 60) | round(1) }}

      - name: "Van läge (nuvarande)"
        unique_id: van_profile_current
        state: "{{ states('sensor.van_profile_device') }}"

      - name: "Van GPS fix senast (HA-tid)"
        unique_id: van_gps_fix_last_time
        device_class: timestamp
        state: "{{ states.sensor.van_gps_fix_senaste_epoch_utc.last_updated }}"

      - name: "Minuter sedan Van GPS fix"
        unique_id: van_minutes_since_gps_fix
        unit_of_measurement: "min"
        state_class: measurement
        state: >
          {% set ts = as_timestamp(states.sensor.van_gps_fix_senaste_epoch_utc.last_updated, default=0) %}
          {% if (states('sensor.van_gps_fix_senaste_epoch_utc') | int(0)) > 0 %}
            {{ ((now().timestamp() - ts) / 60) | round(1) }}
          {% else %}
            9999
          {% endif %}

      - name: "Minuter sedan PIR fram"
        unique_id: van_minutes_since_pir_front
        unit_of_measurement: "min"
        state: >
          {% set s = states('sensor.van_pir_fram_senast_intern') %}
          {% set ts = as_timestamp(s, default=0) %}
          {% if ts > 0 %}
            {{ ((now().timestamp() - ts) / 60) | round(1) }}
          {% else %}
            9999
          {% endif %}

      - name: "Minuter sedan PIR bak"
        unique_id: van_minutes_since_pir_back
        unit_of_measurement: "min"
        state: >
          {% set s = states('sensor.van_pir_bak_senast_intern') %}
          {% set ts = as_timestamp(s, default=0) %}
          {% if ts > 0 %}
            {{ ((now().timestamp() - ts) / 60) | round(1) }}
          {% else %}
            9999
          {% endif %}

    binary_sensor:
      - name: "Van väntar på profil-ACK"
        unique_id: van_waiting_for_profile_ack
        state: "{{ (states('input_number.van_last_sent_profile_change_id') | int(0)) > 0 }}"

      - name: "Van online"
        unique_id: van_online
        state: >
          {% set ts = as_timestamp(states.sensor.van_alive_raw.last_updated, default=0) %}
          {{ (now().timestamp() - ts) < 300 }}

      - name: "Van GPS fix nyligen"
        unique_id: van_gps_fix_recent
        state: >
          {% set ts = as_timestamp(states.sensor.van_gps_fix_senaste_epoch_utc.last_updated, default=0) %}
          {% if (states('sensor.van_gps_fix_senaste_epoch_utc') | int(0)) > 0 %}
            {{ (now().timestamp() - ts) < 600 }}
          {% else %}
            false
          {% endif %}

  - trigger:
      - platform: mqtt
        topic: "van/ellie/tele/pir"
    variables:
      m: "{{ trigger.payload_json.src_mask | int(0) }}"
      now_iso: "{{ now().isoformat() }}"
    binary_sensor:
      - name: "Van PIR fram"
        unique_id: van_pir_front_pulse
        device_class: motion
        state: "{{ m in [1,3] }}"
        auto_off: "00:00:30"

      - name: "Van PIR bak"
        unique_id: van_pir_back_pulse
        device_class: motion
        state: "{{ m in [2,3] }}"
        auto_off: "00:00:30"

    sensor:
      - name: "Van PIR fram senast (intern)"
        unique_id: van_pir_front_last_internal
        device_class: timestamp
        state: >
          {% if m in [1,3] %}
            {{ now_iso }}
          {% else %}
            {{ this.state }}
          {% endif %}

      - name: "Van PIR bak senast (intern)"
        unique_id: van_pir_back_last_internal
        device_class: timestamp
        state: >
          {% if m in [2,3] %}
            {{ now_iso }}
          {% else %}
            {{ this.state }}
          {% endif %}

automation:
  # ---------- Publicera önskad profil retained ----------
  - id: van_publish_desired_profile
    alias: "Van: Publicera önskad profil"
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.van_profile_desired
    variables:
      new_profile: "{{ trigger.to_state.state }}"
      next_id: "{{ (states('input_number.van_profile_change_id') | int(0)) + 1 }}"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.van_profile_change_id
        data:
          value: "{{ next_id }}"

      - service: input_number.set_value
        target:
          entity_id: input_number.van_last_sent_profile_change_id
        data:
          value: "{{ next_id }}"

      - service: mqtt.publish
        data:
          topic: "van/ellie/state/desired_profile"
          retain: true
          qos: 1
          payload: >
            {
              "profile_change_id": {{ next_id }},
              "desired_profile": "{{ new_profile }}"
            }

      - service: input_text.set_value
        target:
          entity_id: input_text.van_last_profile_sent
        data:
          value: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # ---------- När device ACK:ar profiländring ----------
  - id: van_sync_ui_from_profile_ack
    alias: "Van: Sync UI från profil-ACK"
    mode: single
    trigger:
      - platform: mqtt
        topic: "van/ellie/ack"
    variables:
      js: "{{ trigger.payload_json }}"
      ack_id: "{{ js.profile_change_id | default(js.ack_msg_id) | int(0) }}"
      expected_id: "{{ states('input_number.van_last_sent_profile_change_id') | int(0) }}"
      status: "{{ js.status | default('') }}"
      applied_profile: "{{ js.profile | default('') }}"
    condition:
      - condition: template
        value_template: "{{ ack_id == expected_id and status == 'OK' }}"
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ applied_profile in ['PARKED','TRAVEL','ARMED','TRIGGERED','ALARM'] }}"
            sequence:
              - condition: template
                value_template: "{{ states('input_select.van_profile_desired') != applied_profile }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.van_profile_desired
                data:
                  option: "{{ applied_profile }}"

      - service: input_number.set_value
        target:
          entity_id: input_number.van_last_sent_profile_change_id
        data:
          value: 0

  # ---------- Synka UI från faktisk device-profil ----------
  - id: van_sync_ui_profile_from_device
    alias: "Van: Synka UI-läge från device"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.van_profile_device
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state in ['PARKED','TRAVEL','ARMED','TRIGGERED','ALARM'] }}"
      - condition: state
        entity_id: binary_sensor.van_vantar_pa_profil_ack
        state: "off"
      - condition: template
        value_template: "{{ states('input_select.van_profile_desired') != trigger.to_state.state }}"
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.van_profile_desired
        data:
          option: "{{ trigger.to_state.state }}"

  # ---------- Återpublicera retained profil efter HA-start ----------
  - id: van_republish_desired_profile_on_ha_start
    alias: "Van: Återpublicera önskad profil vid HA-start"
    mode: single
    trigger:
      - platform: homeassistant
        event: start
    action:
      - delay: "00:00:15"
      - service: mqtt.publish
        data:
          topic: "van/ellie/state/desired_profile"
          retain: true
          qos: 1
          payload: >
            {
              "profile_change_id": {{ states('input_number.van_profile_change_id') | int(1) }},
              "desired_profile": "{{ states('input_select.van_profile_desired') }}"
            }

  # ---------- Auto-ACK av PIR-event ----------
  - id: van_pir_auto_ack
    alias: "Van: Auto-ACK PIR-event"
    mode: queued
    max: 20
    trigger:
      - platform: mqtt
        topic: "van/ellie/tele/pir"
    variables:
      js: "{{ trigger.payload_json }}"
      eid: "{{ js.pir_event_id | int(0) }}"
    condition:
      - condition: template
        value_template: "{{ eid > 0 }}"
    action:
      - service: mqtt.publish
        data:
          topic: "van/ellie/cmd/ack"
          qos: 0
          retain: false
          payload: >
            { "type": "PIR_ACK", "pir_event_id": {{ eid }} }
